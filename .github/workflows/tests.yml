name: Tests

on:
  pull_request:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ghc: "9.8"
            stack-yaml: "stack.yaml"
          - ghc: "9.10"
            stack-yaml: "stack-ghc910.yaml"
          - ghc: "9.12"
            stack-yaml: "stack-ghc912.yaml"

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2.8.0
        with:
          enable-stack: true
          stack-setup-ghc: true

      - name: Cache Stack
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ matrix.ghc }}-${{ hashFiles(matrix.stack-yaml) }}
          restore-keys: |
            ${{ runner.os }}-stack-${{ matrix.ghc }}-

      - name: Run test suite
        run: stack test --stack-yaml ${{ matrix.stack-yaml }}
